<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificador Agro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; }
        h2 { color: #4caf50; margin: 20px 0; }
        #webcam-container { width: 90%; max-width: 400px; border: 4px solid #4caf50; border-radius: 15px; overflow: hidden; background: #000; }
        #label-container { margin-top: 20px; font-size: 20px; width: 90%; }
        .predicao-item { background: #333; margin: 5px 0; padding: 10px; border-radius: 8px; display: flex; justify-content: space-between; }
        .barra-progresso { height: 10px; background: #4caf50; border-radius: 5px; transition: width 0.3s; }
    </style>
</head>
<body>

    <h2>Diagnóstico de Soja</h2>
    <div id="webcam-container"></div>
    <div id="label-container">Carregando inteligência...</div>

    <script>
        // O link abaixo será gerado após o treinamento gratuito no Teachable Machine
        const URL_MODELO = "https://teachablemachine.withgoogle.com/models/SEU_MODELO_AQUI/";

        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            const modelURL = URL_MODELO + "model.json";
            const metadataURL = URL_MODELO + "metadata.json";

            // Carrega o modelo
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // Configura a webcam
            const flip = false; // Câmera traseira não precisa inverter
            webcam = new tmImage.Webcam(350, 350, flip); 
            await webcam.setup({ facingMode: "environment" }); 
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; // Limpa o texto de carregamento
        }

        async function loop() {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            labelContainer.innerHTML = "";
            
            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction = 
                    `<div class="predicao-item">
                        <span>${prediction[i].className}</span>
                        <span>${(prediction[i].probability * 100).toFixed(0)}%</span>
                    </div>`;
                labelContainer.innerHTML += classPrediction;
            }
        }

        init();
    </script>
</body>
</html>
