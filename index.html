<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro na Palma da Mão - Diagnóstico</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        h2 { color: #4caf50; }
        #status { color: #ffeb3b; margin-bottom: 10px; font-size: 14px; }
        #webcam-container { width: 100%; max-width: 400px; margin: auto; border: 3px solid #4caf50; border-radius: 15px; overflow: hidden; background: #000; }
        canvas { width: 100% !important; height: auto !important; }
        #label-container { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .predicao-box { background: #1e1e1e; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #4caf50; }
        .percentual { font-size: 22px; font-weight: bold; color: #4caf50; }
    </style>
</head>
<body>

    <h2>Diagnóstico de Soja</h2>
    <div id="status">Verificando sensores...</div>
    
    <div id="webcam-container"></div>
    
    <div id="label-container"></div>

    <script>
        // ESTE LINK É O "CÉREBRO". Se estiver vazio ou errado, o app não carrega.
        // Por enquanto, usaremos um modelo padrão para teste.
        const URL = "https://teachablemachine.withgoogle.com/models/I7M-0U-kG/"; 

        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            const status = document.getElementById("status");
            try {
                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";

                status.innerText = "Carregando Inteligência...";
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                status.innerText = "Ligando Câmera...";
                const flip = false; 
                webcam = new tmImage.Webcam(400, 400, flip); 
                
                // Tenta forçar a câmera traseira
                await webcam.setup({ facingMode: "environment" }); 
                
                status.innerText = "Analisando em tempo real";
                await webcam.play();
                
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                labelContainer = document.getElementById("label-container");
                window.requestAnimationFrame(loop);
            } catch (e) {
                status.innerText = "Erro: Certifique-se de usar HTTPS e permitir a câmera.";
                console.error(e);
            }
        }

        async function loop() {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {
                const p = prediction[i];
                if (p.probability > 0.1) { // Só mostra o que tiver mais de 10% de chance
                    labelContainer.innerHTML += `
                        <div class="predicao-box">
                            <span>${p.className}</span>
                            <span class="percentual">${(p.probability * 100).toFixed(0)}%</span>
                        </div>`;
                }
            }
        }

        // Inicia o processo
        init();
    </script>
</body>
</html>
