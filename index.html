<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NDVI Monitor · Chapadinha MA</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:        #080d08;
  --surface:   #0f160f;
  --surface2:  #161e16;
  --surface3:  #1c271c;
  --border:    #1e2e1e;
  --border2:   #243624;
  --neon:      #3dff6e;
  --neon-dim:  #22c55e;
  --neon-glow: rgba(61,255,110,0.18);
  --yellow:    #f5c842;
  --red:       #f04444;
  --orange:    #f5822a;
  --text:      #dff0df;
  --text-dim:  #6b956b;
  --text-muted:#334d33;
  --panel-w:   300px;
  --topbar-h:  52px;
  --bar-h:     34px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }

body {
  font-family: 'Figtree', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* ══ TOPBAR ══ */
.topbar {
  height: var(--topbar-h);
  flex-shrink: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
  z-index: 1000;
  position: relative;
}
.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 17px;
  color: var(--neon);
  letter-spacing: -0.5px;
  flex-shrink: 0;
}
.logo em { color: var(--text-dim); font-style: normal; font-weight: 400; }
.farm-pill {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-size: 11.5px;
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
}
.farm-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--neon);
  box-shadow: 0 0 6px var(--neon);
  animation: blink 2.5s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

.top-actions { display:flex; gap:6px; flex-shrink:0; }
.tb-btn {
  height: 32px;
  padding: 0 10px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 7px;
  color: var(--text-dim);
  font-size: 13px;
  cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  transition: all 0.15s;
  font-family: 'Figtree', sans-serif;
  white-space: nowrap;
}
.tb-btn:hover { border-color: var(--neon-dim); color: var(--neon); background: var(--neon-glow); }
.tb-btn.active { border-color: var(--neon); color: var(--neon); background: var(--neon-glow); }

/* ══ NDVI TICKER ══ */
.ticker {
  height: var(--bar-h);
  flex-shrink: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 18px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  overflow: hidden;
}
.ticker-item { display:flex; align-items:center; gap:5px; flex-shrink:0; }
.ticker-label { color: var(--text-muted); }
.ticker-val { color: var(--text); }
.ticker-sep { color: var(--border2); }
.sat-badge {
  margin-left: auto;
  flex-shrink: 0;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  background: rgba(61,255,110,0.08);
  border: 1px solid rgba(61,255,110,0.2);
  color: var(--neon-dim);
}

/* ══ MAIN ══ */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* ══ MAP ══ */
#map {
  flex: 1;
  z-index: 1;
}

/* Leaflet overrides */
.leaflet-container { background: #080d08 !important; }
.leaflet-control-zoom {
  border: 1px solid var(--border2) !important;
  border-radius: 8px !important;
  overflow: hidden;
}
.leaflet-control-zoom a {
  background: var(--surface) !important;
  color: var(--text-dim) !important;
  border-bottom: 1px solid var(--border) !important;
  font-size: 16px !important;
  width: 30px !important;
  height: 30px !important;
  line-height: 30px !important;
  transition: all 0.15s;
}
.leaflet-control-zoom a:hover { color: var(--neon) !important; background: var(--surface2) !important; }
.leaflet-control-attribution { display: none !important; }
.leaflet-popup-content-wrapper {
  background: rgba(10,15,10,0.97) !important;
  border: 1px solid var(--neon-dim) !important;
  border-radius: 10px !important;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 20px rgba(61,255,110,0.08) !important;
  color: var(--text) !important;
}
.leaflet-popup-tip { background: var(--neon-dim) !important; }
.leaflet-popup-close-button { color: var(--text-dim) !important; font-size: 18px !important; top: 8px !important; right: 10px !important; }
.leaflet-popup-close-button:hover { color: var(--text) !important; }

/* ══ LAYER TOGGLE (map overlay) ══ */
.layer-ctrl {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 900;
  display: flex;
  background: rgba(10,15,10,0.92);
  border: 1px solid var(--border2);
  border-radius: 9px;
  overflow: hidden;
  backdrop-filter: blur(10px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.lc-btn {
  padding: 6px 13px;
  font-family: 'Syne', sans-serif;
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  cursor: pointer;
  color: var(--text-muted);
  transition: all 0.15s;
  white-space: nowrap;
  border-right: 1px solid var(--border);
}
.lc-btn:last-child { border-right: none; }
.lc-btn.active { background: rgba(61,255,110,0.12); color: var(--neon); }
.lc-btn:hover:not(.active) { color: var(--text-dim); }

/* ══ LEGEND (map overlay) ══ */
.legend-ctrl {
  position: absolute;
  bottom: 14px;
  left: 12px;
  z-index: 900;
  background: rgba(8,13,8,0.88);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 8px 11px;
  backdrop-filter: blur(10px);
  min-width: 120px;
}
.leg-title {
  font-family: 'Syne', sans-serif;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-muted);
  margin-bottom: 5px;
}
.leg-bar {
  height: 7px;
  border-radius: 4px;
  background: linear-gradient(to right,
    #7f1d1d 0%, #b91c1c 15%, #ef4444 25%,
    #f97316 35%, #eab308 50%,
    #84cc16 65%, #22c55e 80%, #14532d 100%);
  margin-bottom: 4px;
}
.leg-labels {
  display: flex;
  justify-content: space-between;
  font-family: 'JetBrains Mono', monospace;
  font-size: 8.5px;
  color: var(--text-muted);
}

/* ══ SIDE PANEL ══ */
.panel {
  width: var(--panel-w);
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 800;
  transition: width 0.28s cubic-bezier(.4,0,.2,1), opacity 0.2s;
  overflow: hidden;
  flex-shrink: 0;
}
.panel.hidden { width: 0; opacity: 0; }

.panel-toggle {
  position: absolute;
  right: var(--panel-w);
  top: 50%;
  transform: translateY(-50%);
  z-index: 950;
  width: 18px; height: 44px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-right: none;
  border-radius: 8px 0 0 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 10px;
  transition: right 0.28s cubic-bezier(.4,0,.2,1), color 0.15s;
}
.panel-toggle:hover { color: var(--neon); }
.panel-toggle.closed { right: 0; border-right: 1px solid var(--border); border-left: none; border-radius: 0 8px 8px 0; }

/* Panel sections */
.panel-head {
  padding: 12px 12px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.ph-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 10px;
}
.ph-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  background: var(--surface3);
  border: 1px solid var(--border2);
  color: var(--text-muted);
  padding: 1px 6px;
  border-radius: 10px;
}
.srch {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 7px;
  padding: 7px 11px;
  font-size: 12px;
  color: var(--text);
  outline: none;
  font-family: 'Figtree', sans-serif;
  transition: border-color 0.15s;
}
.srch:focus { border-color: var(--neon-dim); }
.srch::placeholder { color: var(--text-muted); }

.field-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}

.fi {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.15s;
  position: relative;
}
.fi:hover { background: rgba(61,255,110,0.05); }
.fi.active { background: rgba(61,255,110,0.09); border-left-color: var(--neon); }
.fi-alert { border-left-color: var(--red) !important; background: rgba(240,68,68,0.06) !important; }
.fi-alert.active { background: rgba(240,68,68,0.12) !important; }

/* Remove button — sempre visível */
.fi-remove {
  width: 28px; height: 28px;
  border-radius: 7px;
  background: rgba(240,68,68,0.08);
  border: 1px solid rgba(240,68,68,0.25);
  color: var(--red);
  font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  cursor: pointer;
  flex-shrink: 0;
  opacity: 0.7;
}
.fi-remove:hover, .fi-remove:active {
  background: rgba(240,68,68,0.22);
  border-color: var(--red);
  opacity: 1;
}

/* Stripe colorida à esquerda do item */
.fi-color-bar {
  width: 4px;
  height: 36px;
  border-radius: 3px;
  flex-shrink: 0;
  opacity: 0.85;
}

.fi-info { flex: 1; min-width: 0; }
.fi-name {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 13px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: flex;
  align-items: center;
  gap: 5px;
}
.fi-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 600;
  padding: 1px 5px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  flex-shrink: 0;
}
.fi-badge-soja { background: rgba(34,197,94,0.15); color: #22c55e; }
.fi-badge-milho { background: rgba(245,200,66,0.15); color: #f5c842; }
.fi-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 3px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.fi-sub-sep { color: var(--text-muted); }
.fi-trend {
  font-size: 9.5px;
  padding: 1px 5px;
  border-radius: 3px;
}
.fi-trend-up   { color: #22c55e; background: rgba(34,197,94,0.1); }
.fi-trend-down { color: #f04444; background: rgba(240,68,68,0.1); }
.fi-trend-flat { color: #f5c842; background: rgba(245,200,66,0.1); }

.fi-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  flex-shrink: 0;
}
.fi-ndvi {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  flex-shrink: 0;
  line-height: 1;
}
.fi-ndvi-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ══ MODAL CONFIRMAÇÃO REMOVER ══ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: auto;
}
.modal-box {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 22px 22px 18px;
  width: 280px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 30px rgba(61,255,110,0.05);
  transform: scale(0.92) translateY(10px);
  transition: transform 0.2s;
}
.modal-overlay.open .modal-box {
  transform: scale(1) translateY(0);
}
.modal-icon {
  font-size: 28px;
  margin-bottom: 10px;
}
.modal-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 15px;
  color: var(--text);
  margin-bottom: 6px;
}
.modal-desc {
  font-size: 12.5px;
  color: var(--text-dim);
  line-height: 1.5;
  margin-bottom: 18px;
}
.modal-desc strong { color: var(--red); }
.modal-actions {
  display: flex;
  gap: 8px;
}
.modal-btn {
  flex: 1;
  padding: 9px;
  border-radius: 8px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  border: 1px solid;
}
.modal-btn-cancel {
  background: var(--surface2);
  border-color: var(--border2);
  color: var(--text-dim);
}
.modal-btn-cancel:hover { border-color: var(--text-muted); color: var(--text); }
.modal-btn-confirm {
  background: rgba(240,68,68,0.15);
  border-color: var(--red);
  color: var(--red);
}
.modal-btn-confirm:hover { background: rgba(240,68,68,0.28); }

/* ══ PANEL BOTTOM STATS ══ */
.panel-stats {
  border-top: 1px solid var(--border);
  padding: 12px;
  flex-shrink: 0;
}
.ps-title {
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.ps-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 10px;
}
.ps-card {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 7px;
  padding: 8px 9px;
}
.ps-label { font-size: 9.5px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; }
.ps-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  font-weight: 600;
  margin-top: 2px;
}
.ps-sub { font-size: 9px; color: var(--text-muted); margin-top: 1px; }

/* mini chart */
.mini-chart {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 36px;
  padding: 0 2px;
}
.mc-bar {
  flex: 1;
  border-radius: 2px 2px 0 0;
  cursor: pointer;
  transition: opacity 0.15s;
  position: relative;
}
.mc-bar:hover { opacity: 0.75; }
.mc-bar::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 4px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface3);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 2px 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 8.5px;
  color: var(--text);
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.1s;
  z-index: 10;
}
.mc-bar:hover::after { opacity: 1; }

/* ══ POPUP ══ */
.popup-body { min-width: 200px; padding: 2px 0; }
.popup-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 14px;
  color: var(--text);
  margin-bottom: 2px;
}
.popup-ndvi {
  font-family: 'JetBrains Mono', monospace;
  font-size: 26px;
  font-weight: 600;
  line-height: 1;
  margin: 6px 0 2px;
}
.popup-status { font-size: 11px; color: var(--text-dim); margin-bottom: 10px; }
.popup-row {
  display: flex;
  justify-content: space-between;
  font-size: 11.5px;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
  color: var(--text-dim);
}
.popup-row:last-child { border-bottom: none; }
.popup-row span:last-child {
  font-family: 'JetBrains Mono', monospace;
  color: var(--text);
  font-size: 11px;
}
.popup-trend { font-family: 'JetBrains Mono', monospace; font-size: 11px; }

/* colors */
.c-low    { color: #f04444; }
.c-warn   { color: #f5822a; }
.c-med    { color: #f5c842; }
.c-ok     { color: #84cc16; }
.c-good   { color: #22c55e; }
.c-high   { color: #16a34a; }

@media (max-width: 640px) {
  :root { --panel-w: 240px; }
  .lc-btn { padding: 5px 9px; font-size: 9.5px; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">NDVI<em>monitor</em></div>
  <div class="farm-pill">
    <div class="farm-dot"></div>
    <span id="farmLabel">Chapadinha · MA</span>
  </div>
  <div class="top-actions">
    <div class="tb-btn" onclick="locateMe()">📍 Localizar</div>
    <div class="tb-btn" id="btnAlert" onclick="showAlerts()">⚠ <span id="alertCount" style="background:var(--red);color:#fff;font-size:9px;padding:1px 5px;border-radius:10px;">2</span></div>
  </div>
</div>

<!-- TICKER -->
<div class="ticker">
  <div class="ticker-item"><span class="ticker-label">NDVI</span><span class="ticker-val c-ok" id="tkAvg">—</span></div>
  <div class="ticker-sep">·</div>
  <div class="ticker-item"><span class="ticker-label">ÁREA</span><span class="ticker-val" id="tkArea">847 ha</span></div>
  <div class="ticker-sep">·</div>
  <div class="ticker-item"><span class="ticker-label">ALERTAS</span><span class="ticker-val c-low" id="tkAlerts">2</span></div>
  <div class="sat-badge" style="margin-left:auto">22/04 · Sentinel-2</div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- MAP -->
  <div id="map"></div>

  <!-- LAYER CONTROL -->
  <div class="layer-ctrl">
    <div class="lc-btn active" onclick="setLayer(this,'ndvi')">NDVI</div>
    <div class="lc-btn" onclick="setLayer(this,'ndvi-rel')">NDVI Rel.</div>
    <div class="lc-btn" onclick="setLayer(this,'sat')">Satélite</div>
    <div class="lc-btn" onclick="setLayer(this,'rain')">Chuva</div>
    <div class="lc-btn" onclick="setLayer(this,'soil')">Solo</div>
  </div>

  <!-- LEGEND -->
  <div class="legend-ctrl">
    <div class="leg-title" id="legTitle">NDVI</div>
    <div class="leg-bar" id="legBar"></div>
    <div class="leg-labels"><span>0,0</span><span>0,5</span><span>1,0</span></div>
  </div>

  <!-- PANEL TOGGLE -->
  <div class="panel-toggle" id="panelToggle" onclick="togglePanel()">▶</div>

  <!-- SIDE PANEL -->
  <div class="panel" id="panel">
    <div class="panel-head">
      <div class="ph-title">Talhões <span class="ph-count" id="phCount">9</span></div>
      <div class="panel-search" style="margin-top:10px;padding:0">
        <input class="srch" type="text" placeholder="🔍 Buscar..." oninput="filterFields(this.value)">
      </div>
    </div>
    <div class="field-list" id="fieldList"></div>
  </div>

</div>

<!-- MODAL: REMOVER TALHÃO -->
<div class="modal-overlay" id="removeModal">
  <div class="modal-box">
    <div class="modal-icon">🗑️</div>
    <div class="modal-title">Remover talhão?</div>
    <div class="modal-desc">Você está prestes a remover <strong id="modalFieldName">—</strong> da lista. Esta ação não pode ser desfeita.</div>

</div>

<script>

const CENTER = [-3.4194691, -43.4648083];

function mkPoly(clat, clng, wDeg, hDeg, rot=0) {
  // create a rough polygon around center
  const pts = [
    [clat + hDeg/2, clng - wDeg/2],
    [clat + hDeg/2, clng + wDeg/2],
    [clat - hDeg/2, clng + wDeg/2],
    [clat - hDeg/2, clng - wDeg/2],
  ];
  // slight skew
  if (rot) {
    const r = rot * Math.PI/180;
    return pts.map(([lat,lng]) => {
      const dlat = lat - clat, dlng = lng - clng;
      return [clat + dlat*Math.cos(r) - dlng*Math.sin(r)*0.5,
              clng + dlat*Math.sin(r)*0.3 + dlng*Math.cos(r)];
    });
  }
  return pts;
}

// ═══════════════════════════════════════════
// COLOR HELPERS
// ═══════════════════════════════════════════
function ndviColor(v) {
  if (v < 0.25) return '#7f1d1d';
  if (v < 0.35) return '#ef4444';
  if (v < 0.45) return '#f97316';
  if (v < 0.55) return '#f5c842';
  if (v < 0.65) return '#84cc16';
  if (v < 0.75) return '#22c55e';
  return '#16a34a';
}
function ndviClass(v) {
  if (v < 0.35) return 'c-low';
  if (v < 0.50) return 'c-warn';
  if (v < 0.60) return 'c-med';
  if (v < 0.72) return 'c-ok';
  return 'c-good';
}
function ndviStatus(v) {
  if (v < 0.25) return '🔴 Vegetação morta ou solo exposto';
  if (v < 0.35) return '⚠ NDVI Crítico — atenção urgente';
  if (v < 0.50) return '⚡ Abaixo do esperado — monitorar';
  if (v < 0.65) return '✓ Desenvolvimento moderado';
  if (v < 0.80) return '✓ Desenvolvimento saudável';
  return '★ Excelente condição da cultura';
}

// ═══════════════════════════════════════════
// MAP INIT
// ═══════════════════════════════════════════
const map = L.map('map', {
  center: CENTER,
  zoom: 13,
  zoomControl: true,
  attributionControl: false,
});

// Satellite tile layer (Esri World Imagery - free, no key needed)
const SAT_LAYER = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { maxZoom: 19, tileSize: 256 }
);

// Dark basemap
const DARK_LAYER = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  { maxZoom: 19, subdomains: 'abcd' }
);

SAT_LAYER.addTo(map);

// Track mouse coords
map.on('mousemove', e => {
  document.getElementById('coordsCtrl').textContent =
    `Lat ${e.latlng.lat.toFixed(5)} · Lon ${e.latlng.lng.toFixed(5)}`;
});

// ═══════════════════════════════════════════
// POLYGONS
// ═══════════════════════════════════════════
let currentLayer = 'ndvi';
let layerGroup = L.layerGroup().addTo(map);
let selectedId = null;

function getPolygonStyle(f, selected=false) {
  let fillColor = ndviColor(f.ndvi);

  if (currentLayer === 'sat') {
    fillColor = 'transparent';
    return { color: '#fff', weight: selected?2.5:1.5, opacity: 0.9, fillColor, fillOpacity: 0 };
  }
  if (currentLayer === 'rain') {
    const rv = (parseFloat(f.chuva) - 130) / 80; // normalize
    fillColor = `hsl(${200 + rv*40}, 80%, ${30 + rv*20}%)`;
  }
  if (currentLayer === 'soil') {
    const soilColors = { LVAd:'#a16207', LAd:'#92400e', RQo:'#d97706', LVd:'#78350f' };
    fillColor = soilColors[f.solo] || '#a16207';
  }

  return {
    color: selected ? '#fff' : fillColor,
    weight: selected ? 2.5 : 1.5,
    opacity: 0.95,
    fillColor,
    fillOpacity: selected ? 0.72 : 0.60,
  };
}

function buildPopup(f) {
  const col = ndviColor(f.ndvi);
  const cl  = ndviClass(f.ndvi);
  return `<div class="popup-body">
    <div class="popup-title">${f.name}${f.alert ? ' <span style="color:var(--red)">⚠</span>' : ''}</div>
    <div class="popup-ndvi ${cl}">${f.ndvi.toFixed(2)}</div>
    <div class="popup-status">${ndviStatus(f.ndvi)}</div>
    <div class="popup-row"><span>Área</span><span>${f.ha} ha</span></div>
    <div class="popup-row"><span>Cultura</span><span>${f.crop}</span></div>
    <div class="popup-row"><span>Estágio</span><span>${f.stage}</span></div>
    <div class="popup-row"><span>Tendência</span><span class="popup-trend ${f.trend.startsWith('↑')?'c-good':f.trend.startsWith('↓')?'c-low':'c-med'}">${f.trend}</span></div>
    <div class="popup-row"><span>Solo</span><span>${f.solo}</span></div>
    <div class="popup-row"><span>Chuva acum.</span><span>${f.chuva}</span></div>
  </div>`;
}

const polygonRefs = {};

function renderPolygons() {
  layerGroup.clearLayers();

  FIELDS.forEach(f => {
    const latlngs = f.coords;
    const poly = L.polygon(latlngs, getPolygonStyle(f, f.id === selectedId));

    // Label
    const center = poly.getBounds().getCenter();
    const label = L.divIcon({
      className: '',
      html: `<div style="
        font-family:'JetBrains Mono',monospace;
        font-size:11px;font-weight:600;
        color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.9);
        text-align:center;line-height:1.3;pointer-events:none;
        ${f.alert ? 'color:#fca5a5' : ''}
      ">${f.ndvi.toFixed(2)}<br><span style="font-size:9px;opacity:0.7;font-weight:400">${f.name}</span></div>`,
      iconSize: [70, 30],
      iconAnchor: [35, 15],
    });
    const marker = L.marker(center, { icon: label, interactive: false });

    poly.on('click', () => selectField(f.id));
    poly.on('mouseover', () => {
      if (f.id !== selectedId) poly.setStyle({ fillOpacity: 0.80, weight: 2.5 });
    });
    poly.on('mouseout', () => {
      if (f.id !== selectedId) poly.setStyle(getPolygonStyle(f));
    });

    poly.bindPopup(buildPopup(f), {
      maxWidth: 260,
      className: 'ndvi-popup',
    });

    polygonRefs[f.id] = poly;
    layerGroup.addLayer(poly);
    layerGroup.addLayer(marker);
  });
}

// ═══════════════════════════════════════════
// FIELD LIST
// ═══════════════════════════════════════════
function renderFieldList(filter='') {
  const list = document.getElementById('fieldList');
  const filtered = FIELDS.filter(f =>
    f.name.toLowerCase().includes(filter.toLowerCase()) ||
    f.crop.toLowerCase().includes(filter.toLowerCase()) ||
    f.solo.toLowerCase().includes(filter.toLowerCase())
  );

  if (filtered.length === 0) {
    list.innerHTML = `<div style="padding:24px 16px;text-align:center;color:var(--text-muted);font-size:12px;">
      <div style="font-size:22px;margin-bottom:8px">🔍</div>Nenhum talhão encontrado</div>`;
    return;
  }

  list.innerHTML = filtered.map(f => {
    const trendClass = f.trend.startsWith('↑') ? 'fi-trend-up' : f.trend.startsWith('↓') ? 'fi-trend-down' : 'fi-trend-flat';
    const cropBadge = f.crop === 'Soja' ? 'fi-badge-soja' : 'fi-badge-milho';
    return `
    <div class="fi ${f.alert?'fi-alert':''} ${selectedId===f.id?'active':''}" id="li-${f.id}" onclick="selectField(${f.id})">
      <div class="fi-color-bar" style="background:${ndviColor(f.ndvi)}"></div>
      <div class="fi-info">
        <div class="fi-name">
          ${f.name}
          ${f.alert ? '<span style="color:var(--red);font-size:11px">⚠</span>' : ''}
          <span class="fi-badge ${cropBadge}">${f.crop}</span>
        </div>
        <div class="fi-sub">
          <span>${f.ha}ha</span>
          <span class="fi-sub-sep">·</span>
          <span>${f.stage}</span>
          <span class="fi-sub-sep">·</span>
          <span class="fi-trend ${trendClass}">${f.trend}</span>
        </div>
      </div>
      <div class="fi-right">
        <div class="fi-ndvi ${ndviClass(f.ndvi)}">${f.ndvi.toFixed(2)}</div>
        <div class="fi-ndvi-label">NDVI</div>
      </div>
      <div class="fi-remove" onclick="event.stopPropagation(); askRemove(${f.id})" title="Excluir talhão">🗑</div>
    </div>`;
  }).join('');
}

function filterFields(val) { renderFieldList(val); }

// ═══════════════════════════════════════════
// SELECT FIELD
// ═══════════════════════════════════════════
function selectField(id) {
  selectedId = id;
  const f = FIELDS.find(x => x.id === id);
  if (!f) return;

  renderPolygons();
  renderFieldList();

  const poly = polygonRefs[id];
  if (poly) {
    map.fitBounds(poly.getBounds(), { padding: [60, 60] });
    poly.openPopup();
  }

  setTimeout(() => {
    const li = document.getElementById('li-'+id);
    if (li) li.scrollIntoView({ block:'nearest', behavior:'smooth' });
  }, 100);
}

// ═══════════════════════════════════════════
// LAYER SWITCH
// ═══════════════════════════════════════════
function setLayer(el, layer) {
  currentLayer = layer;
  document.querySelectorAll('.lc-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');

  if (layer === 'sat') {
    map.removeLayer(SAT_LAYER);
    SAT_LAYER.addTo(map);
    DARK_LAYER.remove();
    document.getElementById('legTitle').textContent = 'NDVI · Satélite';
    document.getElementById('legBar').style.background = '#2a3a2a';
  } else if (layer === 'rain') {
    DARK_LAYER.addTo(map);
    SAT_LAYER.remove();
    document.getElementById('legTitle').textContent = 'Chuva · mm';
    document.getElementById('legBar').style.background =
      'linear-gradient(to right, #e0f2fe, #38bdf8, #0369a1, #1e3a5f)';
  } else if (layer === 'soil') {
    DARK_LAYER.addTo(map);
    SAT_LAYER.remove();
    document.getElementById('legTitle').textContent = 'Solo · EMBRAPA';
    document.getElementById('legBar').style.background =
      'linear-gradient(to right, #d97706, #92400e, #78350f, #a16207)';
  } else {
    SAT_LAYER.addTo(map);
    DARK_LAYER.remove();
    document.getElementById('legTitle').textContent = 'NDVI';
    document.getElementById('legBar').style.background =
      'linear-gradient(to right,#7f1d1d,#ef4444,#f97316,#eab308,#84cc16,#22c55e,#16a34a)';
  }

  renderPolygons();
}

// ═══════════════════════════════════════════
// PANEL TOGGLE
// ═══════════════════════════════════════════
let panelOpen = true;
function togglePanel() {
  panelOpen = !panelOpen;
  const p = document.getElementById('panel');
  const t = document.getElementById('panelToggle');
  const pw = getComputedStyle(document.documentElement).getPropertyValue('--panel-w').trim();
  p.classList.toggle('hidden', !panelOpen);
  t.classList.toggle('closed', !panelOpen);
  t.textContent = panelOpen ? '▶' : '◀';
  t.style.right = panelOpen ? pw : '0px';
  setTimeout(() => map.invalidateSize(), 300);
}

// ═══════════════════════════════════════════
// LOCATE ME
// ═══════════════════════════════════════════
function locateMe() {
  map.flyTo(CENTER, 13, { duration: 1.2 });
}

// ═══════════════════════════════════════════
// ALERTS
// ═══════════════════════════════════════════
function showAlerts() {
  const alertFields = FIELDS.filter(f => f.alert);
  if (alertFields.length === 0) return;
  const f = alertFields[0];
  selectField(f.id);
}

// ═══════════════════════════════════════════
// EXPORT (mock)
// ═══════════════════════════════════════════
function exportData() {
  const rows = ['Talhão,Área (ha),NDVI,Cultura,Estágio,Tendência,Solo,Chuva,Alerta'];
  FIELDS.forEach(f => {
    rows.push([f.name, f.ha, f.ndvi, f.crop, f.stage, f.trend.replace(/,/g,';'), f.solo, f.chuva, f.alert?'SIM':'NÃO'].join(','));
  });
  const blob = new Blob([rows.join('\n')], { type:'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ndvi_talhoes_chapadinha.csv';
  a.click();
}

// ═══════════════════════════════════════════
// TICKER AVERAGE
// ═══════════════════════════════════════════
function updateTicker() {
  if (FIELDS.length === 0) {
    document.getElementById('tkAvg').textContent = '—';
    document.getElementById('tkArea').textContent = '—';
    document.getElementById('tkAlerts').textContent = '0';
    document.getElementById('alertCount').textContent = '0';
    document.getElementById('phCount').textContent = '0';
    return;
  }
  const avg = (FIELDS.reduce((s,f)=>s+f.ndvi,0)/FIELDS.length).toFixed(2);
  const totalHa = FIELDS.reduce((s,f)=>s+f.ha,0).toFixed(0);
  const alertCount = FIELDS.filter(f=>f.alert).length;

  document.getElementById('tkAvg').textContent = avg;
  document.getElementById('tkArea').textContent = totalHa + ' ha';
  document.getElementById('tkAlerts').textContent = alertCount;
  document.getElementById('alertCount').textContent = alertCount;
  document.getElementById('phCount').textContent = FIELDS.length;
}

// ═══════════════════════════════════════════
// REMOVER TALHÃO
// ═══════════════════════════════════════════
let pendingRemoveId = null;

function askRemove(id) {
  const f = FIELDS.find(x => x.id === id);
  if (!f) return;
  pendingRemoveId = id;
  document.getElementById('modalFieldName').textContent = f.name + ' (' + f.ha + ' ha · ' + f.crop + ')';
  document.getElementById('removeModal').classList.add('open');
}

function closeRemoveModal() {
  pendingRemoveId = null;
  document.getElementById('removeModal').classList.remove('open');
}

function confirmRemove() {
  if (pendingRemoveId === null) return;
  const idx = FIELDS.findIndex(x => x.id === pendingRemoveId);
  if (idx !== -1) {
    FIELDS.splice(idx, 1);
    if (selectedId === pendingRemoveId) selectedId = null;
  }
  closeRemoveModal();
  renderPolygons();
  renderFieldList();
  updateTicker();
}

// Fechar modal clicando fora
document.getElementById('removeModal').addEventListener('click', function(e) {
  if (e.target === this) closeRemoveModal();
});

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
renderPolygons();
renderFieldList();
updateTicker();

// Panel toggle initial position
document.getElementById('panelToggle').style.right =
  getComputedStyle(document.documentElement).getPropertyValue('--panel-w').trim();
</script>
