<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f2417">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>PulveriMet</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--vd:#0f2417;--vm:#1a3d26;--vc:#2d6a40;--vv:#4caf50;--am:#f5c518;--vr:#c0392b;--cl:#d6e4da;--br:#f0f4f1;--ts:#8aaa90}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--vd);color:var(--br);font-family:'DM Sans',sans-serif;min-height:100vh}
header{padding:16px;border-bottom:1px solid #2d5235;display:flex;justify-content:space-between;align-items:center}
.logo h1{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:2px}
.logo h1 span{color:var(--vv)}
.hbtns{display:flex;gap:8px}
button{border:none;border-radius:8px;padding:10px 15px;font-weight:700;cursor:pointer}
.bgps{background:var(--vv);color:var(--vd)}
.bsel{background:var(--vm);color:var(--cl);border:1px solid #3a6645}
#ei{text-align:center;padding:60px 20px}
#ei .ico{font-size:4rem;margin-bottom:15px}
#loading{display:none;text-align:center;padding:50px}
.spin{width:40px;height:40px;border:4px solid #2d5235;border-top-color:var(--vv);border-radius:50%;animation:giro .8s linear infinite;margin:0 auto 15px}
@keyframes giro{to{transform:rotate(360deg)}}
#banner{margin:15px;padding:15px;border-radius:10px;display:none;font-weight:bold}
#banner.IDEAL{background:#1b4d24;color:#a8e6b0;display:block}
#banner.ATENCAO{background:#4a360a;color:#f5d87a;display:block}
#banner.PROIBIDO{background:#4a0f0a;color:#f5a0a0;display:block}
#agora{margin:0 15px;background:var(--vm);border-radius:15px;padding:20px;display:none}
#secoes{display:none;padding:15px}
.ch{min-width:80px;background:var(--vm);padding:10px;border-radius:12px;text-align:center;display:inline-block;margin-right:8px;border:1px solid #2d5235}
#modal{display:none;position:fixed;inset:0;background:#000c;backdrop-filter:blur(5px);z-index:100;align-items:center;justify-content:center;padding:20px}
.mbox{background:var(--vd);padding:25px;border-radius:20px;width:100%;max-width:400px;border:1px solid #3a6645}
input{width:100%;padding:12px;margin:15px 0;background:var(--vm);border:1px solid #3a6645;color:white;border-radius:8px}
.sug{padding:12px;background:var(--vm);margin-bottom:5px;border-radius:8px;cursor:pointer}
</style>
</head>
<body>

<header>
  <div class="logo"><h1>Pulveri<span>Met</span></h1></div>
  <div class="hbtns">
    <button class="bgps" onclick="usarGPS()">GPS</button>
    <button class="bsel" onclick="abrirModal()">Busca</button>
  </div>
</header>

<div id="ei">
  <div class="ico">🌿</div>
  <h2 style="font-family: 'Bebas Neue'; letter-spacing: 2px;">Condições de Campo</h2>
  <p style="color: var(--ts); margin: 15px 0 25px;">Selecione uma localização para análise.</p>
  <button class="bgps" style="padding:15px 30px; font-size:1.1rem" onclick="usarGPS()">📍 Localização Atual</button>
</div>

<div id="loading">
  <div class="spin"></div>
  <p>Consultando Satélites...</p>
</div>

<div id="banner"></div>
<div id="agora"></div>
<div id="secoes">
  <h3 style="color:var(--vv); margin-bottom:10px; font-family:'Bebas Neue'">Próximas Horas</h3>
  <div id="horas" style="overflow-x: auto; white-space: nowrap; padding-bottom:10px"></div>
</div>

<div id="modal">
  <div class="mbox">
    <h3 style="font-family:'Bebas Neue'">Buscar Cidade</h3>
    <input type="text" id="inp" placeholder="Ex: Sorriso, MT" oninput="buscarCidade()">
    <div id="sugs"></div>
    <button class="bsel" style="width:100%; margin-top:10px" onclick="fecharModal()">Fechar</button>
  </div>
</div>

<script>
const g = id => document.getElementById(id);

function resetApp() {
    g('loading').style.display = 'none';
    g('ei').style.display = 'block';
    g('secoes').style.display = 'none';
    g('agora').style.display = 'none';
    g('banner').style.display = 'none';
}

function abrirModal() { g('modal').style.display = 'flex'; }
function fecharModal() { g('modal').style.display = 'none'; }

function usarGPS() {
    g('ei').style.display = 'none';
    g('loading').style.display = 'block';

    if (!navigator.geolocation) {
        alert("GPS não disponível no seu navegador.");
        resetApp();
        return;
    }

    // CONFIGURAÇÃO BLINDADA: timeout maior e enableHighAccuracy: false como fallback
    navigator.geolocation.getCurrentPosition(
        (pos) => {
            carregarDados(pos.coords.latitude, pos.coords.longitude, "Sua Localização");
        },
        (err) => {
            console.error(err);
            if(err.code === 3) {
                alert("O sinal do GPS está fraco. Tente buscar pelo nome da cidade.");
            } else {
                alert("Erro ao acessar GPS. Por favor, use a busca manual.");
            }
            resetApp();
        },
        { 
            enableHighAccuracy: false, // Evita forçar o hardware de satélite puro se o sinal estiver ruim
            timeout: 12000,            // 12 segundos antes de desistir
            maximumAge: 60000          // Aceita localizações de até 1 minuto atrás
        }
    );
}

function buscarCidade() {
    let q = g('inp').value;
    if(q.length < 3) return;
    fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${q}&count=5&language=pt&format=json`)
    .then(r => r.json())
    .then(d => {
        let html = '';
        if(d.results) {
            d.results.forEach(loc => {
                html += `<div class="sug" onclick="carregarDados(${loc.latitude}, ${loc.longitude}, '${loc.name}')">${loc.name}, ${loc.admin1 || ''}</div>`;
            });
        }
        g('sugs').innerHTML = html;
    });
}

function carregarDados(lat, lon, nome) {
    fecharModal();
    g('ei').style.display = 'none';
    g('loading').style.display = 'block';

    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,relativehumidity_2m,windspeed_10m,precipitation&current_weather=true&timezone=auto`)
    .then(r => r.json())
    .then(d => {
        g('loading').style.display = 'none';
        renderizar(d, nome);
    })
    .catch(e => {
        alert("Erro ao carregar dados do clima.");
        resetApp();
    });
}

function avaliar(t, u, v, p) {
    if (t > 35 || u < 40 || v > 20 || p > 0) return 'PROIBIDO';
    if (t > 30 || t < 10 || u < 55 || v > 10 || v < 2) return 'ATENCAO';
    return 'IDEAL';
}

function renderizar(d, nome) {
    const cw = d.current_weather;
    const h = d.hourly;
    const status = avaliar(cw.temperature, h.relativehumidity_2m[0], cw.windspeed, h.precipitation[0]);

    const ban = g('banner');
    ban.className = status;
    ban.innerText = status === 'IDEAL' ? `✅ CONDIÇÕES IDEAIS EM ${nome.toUpperCase()}` : 
                    status === 'ATENCAO' ? `⚠️ ATENÇÃO ÀS RESTRIÇÕES EM ${nome.toUpperCase()}` : 
                    `🚫 PULVERIZAÇÃO PROIBIDA EM ${nome.toUpperCase()}`;

    g('agora').style.display = 'block';
    g('agora').innerHTML = `
        <div style="display:flex; justify-content:space-between">
            <h2 style="font-size:3rem; font-family:'Bebas Neue'">${Math.round(cw.temperature)}°C</h2>
            <div style="text-align:right">
                <p>Vento: ${cw.windspeed}km/h</p>
                <p>UR: ${h.relativehumidity_2m[0]}%</p>
            </div>
        </div>
    `;

    let hhtml = '';
    for(let i=0; i<24; i++) {
        let st = avaliar(h.temperature_2m[i], h.relativehumidity_2m[i], h.windspeed_10m[i], h.precipitation[i]);
        hhtml += `<div class="ch" style="border-top: 4px solid ${st === 'IDEAL' ? '#4caf50' : st === 'ATENCAO' ? '#f5c518' : '#c0392b'}">
            <small>${i}h</small><br>
            <strong>${Math.round(h.temperature_2m[i])}°</strong>
        </div>`;
    }
    g('horas').innerHTML = hhtml;
    g('secoes').style.display = 'block';
}
</script>
</body>
</html>
